name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *" # Exécution quotidienne à minuit
  workflow_dispatch: # Permet le déclenchement manuel

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          # Tes couleurs et réglages de transparence intégrés ici :
          options: username=${{ github.repository_owner }}&show_icons=true&theme=transparent&hide_border=true&title_color=3B82F6&text_color=777777
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          # Même design appliqué aux langages :
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=6&theme=transparent&hide_border=true&title_color=3B82F6&text_color=777777
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          # Pointeur vers ton propre projet :
          options: username=${{ github.repository_owner }}&repo=Absolute-Stream&theme=transparent&hide_border=true&title_color=3B82F6&text_color=777777
          path: profile/pin-absolute-stream.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
